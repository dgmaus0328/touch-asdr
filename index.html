<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Touch Envelope</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="c"></canvas>
  <div class="overlay" aria-hidden="true">
    <p class="title">Touch envelope</p>
    <p class="hint" id="hint">
      <strong>Phone:</strong> touch and hold.<br />
      <strong>Desktop:</strong> click and drag — crosshair uses a simulated radius.<br />
      <span class="hint-sub">Release to log JSON in the browser console (F12 → Console).</span>
    </p>
  </div>
  <script src="app.js"></script>
</body>
</html>
