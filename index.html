<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Touch Envelope</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="input-stage">
    <canvas id="c"></canvas>
  </div>
  <div class="overlay" aria-hidden="true">
    <p class="title">Touch envelope <span id="modeLabel" class="mode-label">— Path + Crosshair</span></p>
    <button id="modeToggle" class="mode-toggle" aria-label="Cycle visualization mode">1</button>
    <button id="shareBtn" class="share-btn" aria-label="Share last gesture JSON">📤</button>
    <p class="hint" id="hint">
      <strong>Phone:</strong> touch and hold.<br />
      <strong>Desktop:</strong> click and drag — crosshair uses a simulated radius.<br />
      <span class="hint-sub">Release to log JSON in the browser console (F12 → Console).</span>
    </p>
    <div id="radiusDisplay" class="radius-display" style="display: none;">
      <div class="radius-row">
        <span class="radius-label">Clamped:</span>
        <span id="radiusValue" class="radius-value">--</span>
        <span class="radius-unit">px</span>
      </div>
      <div class="radius-row radius-raw">
        <span class="radius-label">Raw:</span>
        <span id="radiusRawValue" class="radius-value-small">--</span>
        <span class="radius-unit">px</span>
      </div>
      <div class="radius-row radius-raw">
        <span class="radius-label">Force:</span>
        <span id="forceValue" class="radius-value-small">--</span>
        <span class="radius-unit"></span>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
